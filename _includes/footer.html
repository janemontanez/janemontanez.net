<footer class="pt-5 my-5 text-muted border-top">
  <div class="row">
    <div class="col-md-6 text-end social-media-icons">
      {% for item in site.data.settings.social %}
        {% if item.label %}
          <a href="{{ item.link }}" class="ms-3 fs-5 text-decoration-none">{{ item.label }}</a>
        {% else %}
          <a href="{{ item.link }}" class="ms-3 fs-5"><i class="fab fa-{{ item.icon }}"></i></a>
        {% endif %}
      {% endfor %}
    </div>
    <div class="col-md-6">
      <small>Built with <a href="https://github.com/LeNPaul/academic">Academic</a></small>
    </div>
  </div>
</footer>
